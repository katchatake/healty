version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: healty-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-healty}
      MYSQL_USER: ${DB_USER:-healty_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-healty_password}
    ports:
      # Exposed on a custom port to avoid conflict with existing host MySQL (3306)
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - healty_db_data:/var/lib/mysql
    networks:
      - healty-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: healty-api:latest
    container_name: healty-api
    restart: always
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-7f5e3e2c1a0b9d8c7e6f5a4b3c2d1e0f}
      JWT_EXPIRES_IN: 1d
      DB_HOST: db
      DB_USER: ${DB_USER:-healty_user}
      DB_PASSWORD: ${DB_PASSWORD:-healty_password}
      DB_NAME: ${DB_NAME:-healty}
      DB_PORT: 3306
      DB_DIALECT: mysql
      RUN_SEEDS: ${RUN_SEEDS:-true}
    ports:
      - "${API_HOST_PORT:-3011}:3001"
    depends_on:
      - db
    networks:
      - healty-network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: healty-front:latest
    container_name: healty-front
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
      # NUXT_PUBLIC_API_BASE_URL overrides public.apiBaseUrl in Nuxt 3/4 runtimeConfig
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:3011/api/v1}
    ports:
      - "${FRONT_HOST_PORT:-3010}:3000"
    depends_on:
      - api
    networks:
      - healty-network

volumes:
  healty_db_data:
    driver: local

networks:
  healty-network:
    driver: bridge
