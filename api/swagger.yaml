openapi: 3.0.0
info:
  title: Healty API
  description: Backend modular para la gestión integral de citas, expedientes clínicos y pagos.
  version: 1.0.0
servers:
  - url: http://localhost:4000/api/v1
    description: Servidor Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    UnauthorizedError:
      description: Token JWT inválido o ausente.
    ForbiddenError:
      description: El usuario no tiene el rol necesario.
    ValidationError:
      description: Error de validación de Joi.

paths:
  /auth/login:
    post:
      summary: Iniciar Sesión
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@healty.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/ValidationError'

  /users:
    get:
      summary: Obtener todos los usuarios
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuarios
    post:
      summary: Crear nuevo usuario
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Usuario Creado

  /users/{id}:
    get:
      summary: Obtener usuario por ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
    patch:
      summary: Actualizar usuario parcialmente
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Usuario actualizado
    delete:
      summary: Eliminar usuario
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario eliminado

  /professionals:
